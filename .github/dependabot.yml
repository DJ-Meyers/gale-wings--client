version: 2
registries:
  github-packages:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
updates:
  - package-ecosystem: npm
    directory: "/"
    registries:
      - github-packages
    schedule:
      interval: daily
      time: "09:00"
      timezone: Etc/UTC
    groups:
      gale-wings:
        patterns:
          - "@dj-meyers/*"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
