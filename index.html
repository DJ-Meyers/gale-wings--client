<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./app/assets/favicon.ico" />
    <title>Gale Wings</title>
    <script>
      // Apply the theme before first paint to avoid a flash. An explicit stored
      // choice wins; otherwise fall back to the OS preference. Keep this in sync
      // with getSnapshot in app/hooks/useTheme.ts.
      try {
        var stored = localStorage.getItem('galewings:theme-mode')
        var mode =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
        document.documentElement.setAttribute('data-mode', mode)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
